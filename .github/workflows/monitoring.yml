name: Generate Evidently Reports

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  monitoring:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Generate Evidently reports
        env:
          FRAUD_REFERENCE_DATA_PATH: data/processed/ref_data_sample.csv
          FRAUD_MONITORING_OUTPUT_DIR: reports/evidently
        run: |
          mkdir -p reports/evidently
          python scripts/generate_evidently_reports.py --reference data/processed/ref_data_sample.csv --production data/processed/prod_data_sample.csv --output reports/evidently --force > reports/evidently/summary.log

      - name: Build GitHub step summary
        shell: python
        run: |
          import json
          from pathlib import Path
          summary = json.loads(Path("reports/evidently/monitoring_summary.json").read_text(encoding="utf-8"))
          lines = [
              "## Evidently Monitoring Summary",
              "",
              f"- Generated at: `{summary['generated_at']}`",
              f"- Reference rows: `{summary['reference_rows']}`",
              f"- Production rows: `{summary['production_rows']}`",
              f"- Drift detected: `{summary.get('drift_detected')}`",
              f"- Drifted columns: `{summary.get('drifted_columns')}` / `{summary.get('total_columns')}`",
              f"- Share of drifted columns: `{summary.get('share_drifted_columns')}`",
              f"- Accuracy: `{summary.get('accuracy')}`",
              f"- Precision: `{summary.get('precision')}`",
              f"- Recall: `{summary.get('recall')}`",
              f"- F1-score: `{summary.get('f1_score')}`",
          ]
          Path(".github_step_summary.md").write_text("\n".join(lines), encoding="utf-8")

      - name: Publish summary to Actions
        run: cat .github_step_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Evidently artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidently-reports
          path: |
            reports/evidently/data_drift_report.html
            reports/evidently/classification_report.html
            reports/evidently/monitoring_summary.json
            reports/evidently/summary.log
