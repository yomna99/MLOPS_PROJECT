name: Fraud API CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f deployment/docker/Dockerfile -t fraud-api:ci .

      - name: Run container
        run: docker run -d --name fraud-api-ci -p 8000:8000 fraud-api:ci

      - name: Wait for API to be ready
        run: |
          for i in {1..20}; do
            if curl --fail http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 3
          done
          echo "API did not become ready in time"
          docker logs fraud-api-ci
          exit 1

      - name: Smoke test prediction endpoint
        run: |
          curl --fail http://127.0.0.1:8000/health
          curl --fail \
            -H "Content-Type: application/json" \
            -d @artifacts/sample_prediction_input.json \
            http://127.0.0.1:8000/predict

      - name: Show container logs on failure
        if: failure()
        run: docker logs fraud-api-ci

      - name: Stop container
        if: always()
        run: docker rm -f fraud-api-ci
