name: Fraud API CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start services with Docker Compose
        run: docker compose -f deployment/docker/compose.yaml up --build -d

      - name: Wait for API to be ready
        run: |
          for i in {1..20}; do
            if curl --fail http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 3
          done
          echo "API did not become ready in time"
          docker compose -f deployment/docker/compose.yaml logs
          exit 1

      - name: Wait for web app to be ready
        run: |
          for i in {1..20}; do
            if curl --fail http://127.0.0.1:8501/ > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Web app did not become ready in time"
          docker compose -f deployment/docker/compose.yaml logs
          exit 1

      - name: Smoke test prediction endpoint
        run: |
          curl --fail http://127.0.0.1:8000/health
          curl --fail http://127.0.0.1:8501/ > /dev/null
          curl --fail \
            -H "Content-Type: application/json" \
            -d @artifacts/sample_prediction_input.json \
            http://127.0.0.1:8000/predict

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f deployment/docker/compose.yaml logs

      - name: Stop services
        if: always()
        run: docker compose -f deployment/docker/compose.yaml down
